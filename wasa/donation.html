 <style>
        body {
            font-family: Arial, sans-serif;
            background-color:#f0fcff;
            margin: 0;
            padding:100px  20px 50px 20px;
        }

/* Navbar Styling */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color:#fff;
  padding: 10px ;
  position: fixed;
  width: 100%;
  top: 0;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  z-index: 1000;
}

/* Logo Styling */
.nav-logo {
  width: 100px;
}

/* Navigation Links */
.nav-links {
  list-style: none;
  display: flex;
  gap: 30px;
}

.nav-links li {
  display: inline;
}

.nav-links a {
  text-decoration: none;
  color: #333;
  font-size: 18px;
  transition: color 0.3s ease;
}

.nav-links a:hover {
  color: #f45942; /* Change color on hover */
}

/* Get Quote Button */
.get-quote {
  background-color: #ff4081;
  padding: 10px 20px;
  border-radius: 20px;
}

.btn-quote {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
}

.get-quote:hover {
  background-color: #e94736; /* Darken on hover */
}



        .donation-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .donation-amount {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .donation-amount button {
            width: 30%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #e7e7e7;
            cursor: pointer;
        }

        .donation-amount button.selected {
            background-color: #4CAF50;
            color: white;
        }

        .btn-donate {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-donate:hover {
            background-color: #45a049;
        }
/* Footer Styling */
footer {
  background-color:#f0fcff;
  padding: 20px 50px;
  text-align: center;
}

.footer-container {
  max-width: 1200px;
  margin: 0 auto;
}

.footer-content p {
  margin: 0;
  color: #333;
  font-size: 16px;
}

.social-icons {
  margin-top: 10px;
}

.social-icons a {
  margin: 0 10px;
  display: inline-block;
}

.social-icons img {
  width: 30px; /* Size of the icons */
  transition: transform 0.3s;
}

.social-icons img:hover {
  transform: scale(1.1); /* Scale up on hover */
}

    </style>
</head>

<header>
  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="https://i.ibb.co/k02Hhg3/logo.png" alt="Wasa Animal Rescue Team Logo" class="nav-logo">
      </a>

    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href=" index.html#services">Services</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href=" index.html#contact">Contact</a></li>
    </ul>
    <div class="get-quote">
      <a href="#contact" class="btn-quote">Donate</a>
    </div>
  </nav>
</header>
</br>

<!-- donation Start -->
   <div class="donation-container">
    <h2>Donate to WASA Animal Rescue</h2>
    <form action="/submit-donation" method="post">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Your email address" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="phone" placeholder="Your phone number" required>
        </div>

        <div class="form-group">
            <label for="donation-amount">Select Donation Amount</label>
            <div class="donation-amount">
                <button type="button" class="amount-btn" onclick="selectAmount(500)">₹500</button>
                <button type="button" class="amount-btn" onclick="selectAmount(1000)">₹1,000</button>
                <button type="button" class="amount-btn" onclick="selectAmount(5000)">₹5,000</button>
            </div>
            <input type="number" id="donation-amount" name="donation_amount" placeholder="Or enter custom amount" required>
        </div>

        <div class="form-group">
            <label for="payment-method">Payment Method</label>
            <select id="payment-method" name="payment_method" required>
                <option value="" disabled selected>Select your payment method</option>
                <option value="credit_card">Credit Card</option>
                <option value="debit_card">Debit Card</option>
                <option value="upi">UPI</option>
                <option value="net_banking">Net Banking</option>
            </select>
        </div>

        <button type="submit" class="btn-donate">Donate Now</button>
    </form>
</div>
<footer>
  <div class="footer-container">
    <div class="footer-content">
      <p>&copy; 2024 Wasa Animal Rescue Team. All rights reserved.</p>
      <div class="social-icons">
        <a href="https://www.facebook.com/profile.php?id=100084286733461&mibextid=ZbWKwL" target="_blank">
          <img src="https://img.icons8.com/ios-filled/50/000000/facebook-new.png" alt="Facebook" />
        </a>
        <a href="https://youtube.com/channel/UCc1Rtj_MRGXJ54X9mWzlrXw" target="_blank">
          <img src="https://img.icons8.com/ios-filled/50/000000/youtube.png" alt="Youtube" />
        </a>
        <a href="https://www.instagram.com/invites/contact/?i=m5q9phr5drgb&utm_content=p0c31em" target="_blank">
          <img src="https://img.icons8.com/ios-filled/50/000000/instagram-new.png" alt="Instagram" />
        </a>
       </div>
    </div>
  </div>
</footer>


<script>
    function selectAmount(amount) {
        document.getElementById('donation-amount').value = amount;
        var buttons = document.getElementsByClassName('amount-btn');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].classList.remove('selected');
        }
        event.target.classList.add('selected');
    }
</script>
